<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="CSS/style.css">
    <link rel="stylesheet" href="CSS/inventario.css">
    <title>Document</title>
</head>

<body>

    <barra-aside class="aside"></barra-aside>

    <main class="main">
        <section class="contenedor-usuarios">
            <buscador-componente id="buscador-componente"></buscador-componente>
            <mi-tabla id="tabla-componente" class="tabla-componente"></mi-tabla>
        </section>

    </main>


    <div class="modal-overlay">
        <div class="modal-contenedor">
            <form class="modal-form">
                <h2 class="modal-titulo">Registrar Producto</h2>

                <label for="codigo">Código</label>
                <input type="text" name="codigo" id="codigo" placeholder="002145" required>

                <label for="nombre">Nombre</label>
                <input type="text" name="nombre" id="nombre" placeholder="Mantequilla" required>

                <label for="tipo">Tipo de Producto</label>
                <select name="tipo" id="tipo" required>
                    <option value="" selected disabled>Seleccionar</option>
                    <option value="Materia Prima">Materia Prima</option>
                    <option value="Producto Elaborado">Producto Elaborado</option>
                </select>

                <label for="stock">Stock</label>
                <input name="stock" type="number" id="stock" placeholder="0" required>

                <label for="proveedor">Proveedor</label>
                <input name="proveedor" type="text" id="proveedor" placeholder="Colanta" required>

                <div class="modal-botones">
                    <button type="button" class="btn-cancelar" onclick="ocultarModal()">Cancelar</button>
                    <button type="submit" class="btn-guardar">Guardar</button>
                </div>
            </form>
        </div>
    </div>
    <script src="JS/componentes.js"></script>
    <script src="JS/inventario.js"></script>
</body>

</html>
