<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="/CSS/usuarios.css">
    <title>Document</title>
</head>

<body>
    <div class="cont-nav">
        <h2 class="logo">ACME</h2>
        <nav class="nav">
            <a href="">Usuario</a>
            <a href="">Inventario</a>
            <a href="">Receta</a>
        </nav>
    </div>
    <main class="main">
        <section class="contenedor-usuarios">
            <div class="barra-busqueda">
                <div class="contenedor-buscador">
                    <input type="text" id="buscador" class="buscador" placeholder="Buscar...">
                    <i class="bi bi-search icon-buscar"></i>
                </div>
                <select>
                    <option value="default" selected disabled>Seleccionar</option>
                    <option value="nombre">Nombre</option>
                    <option value="cc">Cedula</option>

                </select>
                <button onclick="mostrarModal()"><i class="bi bi-plus-lg"></i> Agregar</button>
            </div>
            <mi-tabla id="tabla-componente" class="tabla-componente"></mi-tabla>
        </section>

    </main>


    <div class="modal-overlay">
        <div class="modal-contenedor">
            <form class="modal-form">
                <h2 class="modal-titulo">Registrar Usuario</h2>

                <label for="identificacion">Número de Identificación</label>
                <input type="text" name="identificacion" id="identificacion" placeholder="1092529698" required>

                <label for="nombre">Nombre</label>
                <input type="text" name="nombre" id="nombre" placeholder="Juan Cardenas" required>

                <label for="cargo">Cargo</label>
                <select name="cargo" id="cargo" required>
                    <option value="" selected disabled>Seleccionar</option>
                    <option value="Administrador">Administrador</option>
                    <option value="Trabajador">Trabajador</option>
                </select>

                <label for="password">Contraseña</label>
                <input name="password" type="password" id="password" placeholder="••••••••" required>

                <label for="passwordRep">Repetir Contraseña</label>
                <input name="passwordRep" type="password" id="passwordRep" placeholder="••••••••" required>

                <div class="modal-botones">
                    <button type="button" class="btn-cancelar" onclick="ocultarModal()">Cancelar</button>
                    <button type="submit" class="btn-guardar">Guardar</button>
                </div>
            </form>
        </div>
    </div>
    <script src="/JS/componentes.js"></script>
    <script src="/JS/usuarios.js"></script>

</body>

</html>
