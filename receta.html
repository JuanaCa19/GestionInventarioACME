<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="CSS/style.css">
    <link rel="stylesheet" href="CSS/receta.css">
    <title>Recetas</title>
</head>

<body>
    <barra-aside class="aside"></barra-aside>

    <main class="main">
        <section class="contenedor-usuarios">
            <buscador-componente id="buscador-componente"></buscador-componente>
            <mi-tabla id="tabla-componente" class="tabla-componente"></mi-tabla>
        </section>

    </main>

    <div class="modal-overlay">
        <div class="modal-contenedor">
            <form class="modal-form">
                <h2 class="modal-titulo">Registrar Receta</h2>

                <label for="nombre">Nombre</label>
                <input type="text" name="nombre" id="nombre" placeholder="Receta de Galleta" required>

                <label for="producto">Producto a Elaborar</label>
                <select name="producto" id="producto" required>
                    
                </select>

                <label for="materiales">Materiales</label>
                <select name="materiales" id="materiales" required>
                    
                </select>

                <label for="cantidad">Cantidad</label>
                <input name="cantidad" type="number" id="cantidad" placeholder="0" required min="0">

                <div id="cont-receta-items" class="cont-receta-items">

                </div>

                <button type="button" id="btn-materiales" class="btn-guardar">Guardar Producto</button>



                <div class="modal-botones">
                    <button type="button" class="btn-cancelar" onclick="ocultarModal()">Cancelar</button>
                    <button type="submit" class="btn-guardar">Guardar</button>
                </div>
            </form>
        </div>
    </div>
    <script src="JS/componentes.js"></script>
    <script src="JS/receta.js"></script>
</body>

</html>
