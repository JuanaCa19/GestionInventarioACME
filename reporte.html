<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="CSS/reporte.css">
    <link rel="stylesheet" href="CSS/style.css">
    <title>Reporte</title>
</head>

<body>

    <barra-aside class="aside"></barra-aside>
    <main class="main">
        <section class="contenedor-usuarios">
            <buscador-componente id="buscador-componente"></buscador-componente>
            <form class="contenedor-fechas">
                <label for="fechaInicio">Fecha Inicio: </label>
                <input type="date" name="fechaInicio" id="fechaInicio" required>
                <label for="fechaFin">Fecha Fin: </label>
                <input type="date" name="fechaFin" id="fechaFin" required>
                <button type="submit">Buscar</button>
            </form>

            <mi-tabla id="tabla-componente" class="tabla-componente"></mi-tabla>
        </section>

    </main>
    <script src="JS/componentes.js"></script>
    <script src="JS/reporte.js"></script>
</body>

</html>
